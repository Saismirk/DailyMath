<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Math</title>

    <!-- Vue 3 & Tailwind CSS -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- KaTeX for high-performance Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #171717;
            color: #e5e5e5;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* Custom Scrollbar to match dark desktop themes */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #171717; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; border: 2px solid #171717; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Markdown Styles adjustments */
        .md-content p { margin-bottom: 0.75rem; line-height: 1.6; }
        .md-content p:last-child { margin-bottom: 0; }
        .md-content ol { list-style-type: decimal; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .md-content li { margin-bottom: 0.35rem; }
        .md-content strong { color: #ffffff; font-weight: 600; }
        .md-content a { color: #7fb8e8; text-decoration: underline; }
        
        /* KaTeX specific overrides for better inline blending */
        .katex { font-size: 1.1em; }
        .main-formula .katex { font-size: 1.4em; }
    </style>
</head>
<body>

    <div id="app" class="flex flex-col h-screen w-full">
        
        <!-- Home Screen -->
        <div v-if="!appStarted" class="flex flex-col items-center justify-center h-full bg-[#171717] text-center p-4">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">Welcome to Daily Math</h1>
            <div class="text-left max-w-md mx-auto bg-[#242424] p-6 rounded-lg">
                <h2 class="text-xl md:text-2xl font-semibold text-white mb-4">How to Use:</h2>
                <ul class="list-disc list-inside text-gray-300 space-y-2 text-sm md:text-base">
                    <li>Use the <b><i>Next</i></b> and <b><i>Previous</i></b> buttons to navigate through questions.</li>
                    <li>Toggle <b><i>Hints</i></b> for additional help.</li>
                    <li>Toggle <b><i>Solution</i></b> to show solution steps.</li>
                    <li>Toggle <b><i>Answer</i></b> to see the solution.</li>
                    <li>Mark questions as solved to track your progress.</li>
                </ul>
            </div>
            <button @click="startApp" class="mt-8 px-8 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">Start</button>
        </div>

        <!-- Question View -->
        <template v-if="appStarted">
            <!-- ── Header ────────────────────────────────────────────────── -->
            <div class="bg-[#242424] px-4 md:px-[28px] py-3 md:py-[14px] flex justify-between items-center shrink-0">
                <div class="flex flex-col gap-1 md:gap-[3px]">
                    <div class="text-[#7fb8e8] text-[10px] md:text-[11px] font-medium tracking-[0.8px] md-content" v-html="topicHtml">
                    </div>
                    <div class="text-white text-lg md:text-[21px] font-semibold">
                        {{ currentQuestion.title }}
                    </div>
                </div>
                
                <div class="flex items-center gap-2 md:gap-4">
                    <div class="flex flex-col items-end gap-0.5 md:gap-[2px]">
                        <div class="text-[#7fb8e8] text-base md:text-[18px] font-semibold">
                            {{ progressText }}
                        </div>
                        <div class="text-[#4a7aaa] text-[9px] md:text-[10px]">
                            questions
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-0.5 md:gap-[2px]">
                        <div class="text-[#7fb8e8] text-base md:text-[18px] font-semibold">
                            {{ Math.round(progressPercentage) }}%
                        </div>
                        <div class="text-[#4a7aaa] text-[9px] md:text-[10px]">
                            complete
                        </div>
                    </div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="w-full bg-gray-700 h-1">
                <div class="bg-blue-500 h-1" :style="{ width: progressPercentage + '%' }"></div>
            </div>

            <!-- ── Scrollable content ────────────────────────────────────── -->
            <div class="flex-1 overflow-y-auto">
                <div class="mx-4 md:mx-[36px] mt-5 md:mt-[20px] mb-6 md:mb-[24px] flex flex-col gap-6 md:gap-[32px]">
                    
                    <!-- Question description (markdown with inline math) -->
                    <div class="md-content px-2 md:px-[20px] text-sm md:text-[15px]" v-math="descriptionHtml"></div>

                    <!-- Main formula (LaTeX) -->
                    <div class="main-formula flex justify-center w-full" v-math="mainFormulaHtml"></div>

                    <!-- Proof badge -->
                    <div v-if="currentQuestion.isProof" 
                         class="self-start bg-[#2B2B2B] border border-[#aac4e8] rounded-[4px] px-2.5 py-1">
                        <span class="text-[#2a5599] text-[11px] md:text-[12px] font-medium">✎  Proof / Identity</span>
                    </div>

                    <!-- Hints panel -->
                    <div v-show="hintsVisible" 
                         class="bg-[#242424] border-b-[3px] border-[#0D0D0D] rounded-lg px-4 py-3 md:px-[20px] md:py-[14px] flex flex-col gap-1.5 md:gap-[6px]">
                        <div class="font-semibold text-[10px] md:text-[11px] tracking-[1.2px] text-gray-400">HINTS</div>
                        <div class="md-content text-sm md:text-[14.5px] text-gray-300" v-math="hintsHtml"></div>
                    </div>

                    <!-- Solution panel -->
                    <div v-show="solutionVisible" 
                         class="bg-[#242424] border-b-[3px] border-[#0D0D0D] rounded-lg px-4 py-3 md:px-[20px] md:py-[14px] flex flex-col gap-1.5 md:gap-[6px]">
                        <div class="font-semibold text-[10px] md:text-[11px] tracking-[1.2px] text-gray-400">SOLUTION</div>
                        <div class="md-content text-sm md:text-[14.5px] text-gray-300" v-math="solutionHtml"></div>
                    </div>

                    <!-- Answer panel -->
                    <div v-show="answerVisible" 
                         class="bg-[#242424] border-b-[3px] border-[#0D0D0D] rounded-lg px-4 py-3 md:px-[20px] md:py-[14px] flex flex-col gap-2 md:gap-[8px]">
                        <div class="font-semibold text-[10px] md:text-[11px] tracking-[1.2px] text-gray-400">ANSWER</div>
                        <div class="flex justify-center text-white" v-math="answerFormulaHtml"></div>
                    </div>

                </div>
            </div>

            <!-- ── Navigation bar ────────────────────────────────────────── -->
            <div class="bg-[#2B2B2B] border-t border-[#050505] px-4 py-2 md:px-[24px] md:py-[10px] flex flex-col md:flex-row justify-between items-center shrink-0 gap-4">
                
                <div class="flex w-full md:w-auto justify-between">
                    <button @click="prev" :disabled="!canGoPrev" 
                            class="px-4 py-2 md:px-[18px] md:py-[8px] text-xs md:text-[13px] rounded transition-colors duration-200"
                            :class="canGoPrev ? 'text-gray-200 hover:bg-white/10 active:bg-white/20 cursor-pointer' : 'text-gray-600 cursor-not-allowed'">
                        ← Previous
                    </button>
                    <div class="flex items-center md:hidden">
                        <input type="checkbox" :id="'solved-sm-' + currentQuestion.id" :checked="isSolved(currentQuestion.id)" @change="toggleSolved(currentQuestion.id)" class="form-checkbox h-4 w-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                        <label :for="'solved-sm-' + currentQuestion.id" class="ml-2 text-xs text-gray-300">Solved</label>
                    </div>
                    <button @click="next" :disabled="!canGoNext" 
                            class="px-4 py-2 md:px-[18px] md:py-[8px] text-xs md:text-[13px] rounded transition-colors duration-200"
                            :class="canGoNext ? 'text-gray-200 hover:bg-white/10 active:bg-white/20 cursor-pointer' : 'text-gray-600 cursor-not-allowed'">
                        Next →
                    </button>
                </div>

                <div class="flex gap-2 md:gap-[10px] md:absolute md:left-1/2 md:-translate-x-1/2">
                    <button @click="toggleHints" 
                            class="px-3 py-2 md:px-[16px] md:py-[8px] text-xs md:text-[13px] text-gray-200 rounded hover:bg-white/10 active:bg-white/20 transition-colors duration-200">
                        {{ hintsButtonText }}
                    </button>
                    <button @click="toggleSolution" v-if="currentQuestion.solutionMarkdown"
                            class="px-3 py-2 md:px-[16px] md:py-[8px] text-xs md:text-[13px] text-gray-200 rounded hover:bg-white/10 active:bg-white/20 transition-colors duration-200">
                        {{ solutionButtonText }}
                    </button>
                    <button @click="toggleAnswer" 
                            class="px-3 py-2 md:px-[16px] md:py-[8px] text-xs md:text-[13px] text-gray-200 rounded hover:bg-white/10 active:bg-white/20 transition-colors duration-200">
                        {{ answerButtonText }}
                    </button>
                </div>

                <div class="hidden md:flex items-center gap-4">
                    <div class="flex items-center">
                        <input type="checkbox" :id="'solved-lg-' + currentQuestion.id" :checked="isSolved(currentQuestion.id)" @change="toggleSolved(currentQuestion.id)" class="form-checkbox h-4 w-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                        <label :for="'solved-lg-' + currentQuestion.id" class="ml-2 text-sm text-gray-300">Mark as Solved</label>
                    </div>
                </div>

            </div>
        </template>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        // Custom Vue Directive to handle Math rendering safely on DOM updates
        const mathDirective = {
            mounted(el, binding) { renderMath(el, binding.value); },
            updated(el, binding) { renderMath(el, binding.value); }
        };

        function renderMath(el, htmlString) {
            el.innerHTML = htmlString;
            renderMathInElement(el, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        }

        async function loadQuestionRepository() {
            const response = await fetch('./questionRepository.json');
            if (!response.ok) {
                throw new Error(`Failed to load questionRepository.json (${response.status})`);
            }
            return response.json();
        }

        async function bootstrap() {
            const questionRepository = await loadQuestionRepository();
            
            // Configure marked to open links in new tabs
            marked.use({
                renderer: {
                    link(token) {
                        const href = token.href || '';
                        const title = token.title || '';
                        const text = token.text || '';
                        const titleAttr = title ? ` title="${title}"` : '';
                        return `<a href="${href}"${titleAttr} target="_blank" rel="noopener noreferrer">${text}</a>`;
                    }
                }
            });
            
            const app = createApp({
            setup() {
                const appStarted = ref(false);
                const currentIndex = ref(0);
                const hintsVisible = ref(false);
                const solutionVisible = ref(false);
                const answerVisible = ref(false);
                const solvedQuestions = ref(new Set());

                onMounted(() => {
                    const solvedCookie = document.cookie.split(';').find(c => c.trim().startsWith('solvedQuestions='));
                    if (solvedCookie) {
                        const solvedIds = solvedCookie.split('=')[1];
                        if (solvedIds) {
                            solvedQuestions.value = new Set(solvedIds.split(',').map(Number));
                        }
                    }
                });

                // --- Computed View State ---
                const currentQuestion = computed(() => questionRepository[currentIndex.value]);
                const progressText = computed(() => `${currentIndex.value + 1}  /  ${questionRepository.length}`);
                const progressPercentage = computed(() => (solvedQuestions.value.size / questionRepository.length) * 100);
                
                const canGoPrev = computed(() => currentIndex.value > 0);
                const canGoNext = computed(() => currentIndex.value < questionRepository.length - 1);
                
                const hintsButtonText = computed(() => hintsVisible.value ? "Hide Hints" : "Hints ▾");
                const solutionButtonText = computed(() => solutionVisible.value ? "Hide Solution" : "Solution ▾");
                const answerButtonText = computed(() => answerVisible.value ? "Hide Answer" : "Show Answer");

                // --- Markdown & LaTeX Generators ---
                const topicHtml = computed(() => appStarted.value ? marked.parse(currentQuestion.value.topic) : '');
                const descriptionHtml = computed(() => appStarted.value ? marked.parse(currentQuestion.value.descriptionMarkdown) : '');
                const hintsHtml = computed(() => appStarted.value ? marked.parse(currentQuestion.value.hintsMarkdown) : '');
                const solutionHtml = computed(() => (appStarted.value && currentQuestion.value.solutionMarkdown) ? marked.parse(currentQuestion.value.solutionMarkdown) : '');
                
                const mainFormulaHtml = computed(() => appStarted.value ? `$$ ${currentQuestion.value.mainFormulaLaTeX} $$` : '');
                const answerFormulaHtml = computed(() => appStarted.value ? `$$ ${currentQuestion.value.answerFormulaLaTeX} $$` : '');

                // --- Commands (Navigation & Toggles) ---
                function startApp() {
                    appStarted.value = true;
                }

                function prev() {
                    if (canGoPrev.value) {
                        currentIndex.value--;
                        resetPanels();
                    }
                }

                function next() {
                    if (canGoNext.value) {
                        currentIndex.value++;
                        resetPanels();
                    }
                }

                function resetPanels() {
                    hintsVisible.value = false;
                    solutionVisible.value = false;
                    answerVisible.value = false;
                }

                function toggleHints() { hintsVisible.value = !hintsVisible.value; }
                function toggleSolution() { solutionVisible.value = !solutionVisible.value; }
                function toggleAnswer() { answerVisible.value = !answerVisible.value; }

                function isSolved(id) {
                    return solvedQuestions.value.has(id);
                }

                function toggleSolved(id) {
                    const newSolved = new Set(solvedQuestions.value);
                    if (newSolved.has(id)) {
                        newSolved.delete(id);
                    } else {
                        newSolved.add(id);
                    }
                    solvedQuestions.value = newSolved;
                    document.cookie = `solvedQuestions=${Array.from(solvedQuestions.value).join(',')}; max-age=31536000; path=/`;
                }

                return {
                    appStarted, startApp,
                    currentQuestion, progressText, canGoPrev, canGoNext,
                    hintsVisible, solutionVisible, answerVisible,
                    hintsButtonText, solutionButtonText, answerButtonText,
                    topicHtml, descriptionHtml, hintsHtml, solutionHtml, mainFormulaHtml, answerFormulaHtml,
                    prev, next, toggleHints, toggleSolution, toggleAnswer,
                    progressPercentage, isSolved, toggleSolved
                };
            }
            });

            // Register custom directive globally before mounting
            app.directive('math', mathDirective);
            app.mount('#app');
        }

        bootstrap().catch((error) => {
            console.error('Failed to start Daily Math:', error);
        });
    </script>
</body>
</html>
